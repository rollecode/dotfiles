general {
    lock_cmd = pidof hyprlock || hyprlock
    # Workaround for AvengeMedia/DankMaterialShell#2694: Volume OSD stops
    # appearing after a hyprlock unlock plus DPMS resume cycle. SIGTERM dms,
    # systemd Restart=always respawns a fresh dms in ~3 seconds with a clean
    # VolumeOSD instance. KillMode=process on dms.service keeps every other
    # app in the cgroup (chromium, terminals, MCP servers, etc) alive.
    unlock_cmd = pkill -TERM dms
}

listener {
    timeout = 86400
    on-timeout = true
}

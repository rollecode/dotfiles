# One-shot migration: the running 22.7 session's binary predates [hot_corners],
# so the section lives in pending-hot-corners.toml until the next compositor
# start, where the new binary parses it. Idempotent via the grep guard; safe to
# delete this drop-in and the pending file once the section is in config.toml.
[Service]
ExecStartPre=-/bin/sh -c 'C=%h/.config/driftwm/config.toml; P=%h/.config/driftwm/pending-hot-corners.toml; if [ -f "$P" ] && ! grep -q "^\\[hot_corners\\]" "$C"; then cat "$P" >> "$C"; fi; true'

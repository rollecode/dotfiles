# Validate the driftwm config against the installed binary before the
# compositor starts, rolling back to the last known-good pair if it fails.
# Lives here rather than in /usr/lib/systemd/user/driftwm.service because
# that file is owned by the driftwm package and is overwritten on upgrade.
[Service]
ExecStartPre=-/home/rolle/.local/bin/driftwm-preflight

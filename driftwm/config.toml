# driftwm config, 3.7.2026. Grounded in docs/config.md for 0.13.0
# (validate with: driftwm --check-config). Everything omitted uses defaults.
# Muscle memory mirrored from Hyprland: Super+Q terminal, Super+C close,
# Super+K DMS launcher, Super+L DMS lock, Super+drag moves windows.
# Canvas extras: Mod+0 zoom reset, Mod+W fit all, wheel on canvas zooms.

focus_follows_mouse = true

# DMS is the shell. Stop any leftover dms.service from a previous Hyprland
# session first (it survives logout by design), then own a fresh instance.
# The Lounge starts after DMS; its window rule below pins it to the screen.
autostart = [
  "systemctl --user stop dms.service 2>/dev/null; exec dms run",
  "sleep 6; exec /home/rolle/Projects/thelounge-native-linux-app/node_modules/.bin/electron /home/rolle/Projects/thelounge-native-linux-app --ozone-platform=wayland",
]

[input.keyboard]
layout = "fi"
model = "pc105"
# Same xkb options as Hyprland: AltGr as level3, Caps acts as Escape.
options = "lv3:ralt_switch,caps:escape"

[input.mouse]
# FPS-tier raw input: flat = no acceleration curve at all, 1 mm of mouse is
# always the same cursor distance: one millimeter of mouse is one unit of
# cursor, FPS style. Earlier flat tests were contaminated
# by the composited-cursor latency; this is the clean run on the hardware
# cursor. Speed adjust under flat: accel_speed scales linearly.
accel_profile = "flat"
accel_speed = 0.0

# disable_hardware_cursor was tried 3.7.2026 and REVERTED: compositing the
# cursor ties it to frame rate and the added latency was felt immediately
# ("even more floaty"). The KMS hardware cursor is the responsive one here.
[backend]
disable_hardware_cursor = false

[navigation]
# No momentum coast on canvas pans: the default 0.5 felt "floaty". Raise
# toward 0.5 later if some glide turns out to be missed.
drift = 0.0

# Titlebars matched to the Hyprland hyprbars look: same height, same dark
# bar, white text, Archivo. driftwm's corner radius kept (default 10).
[decorations]
# Solid dark bar for regular windows (foot is barless via its rule below).
bg_color = "#0c0e12"
fg_color = "#ffffff"
title_bar_height = 28
font = "Archivo"
font_size = 9
title_align = "left"
shadow = false

# Frosted-glass strength for blurred windows: approximates Hyprland's
# blur size 12 / passes 4 (Kawase passes + spread here).
[effects]
blur_radius = 1
blur_strength = 3.0

# Living space shader: parallax stars with independent twinkle, purple
# nebula, galaxies, rare supernovae. Edit the .glsl, then Mod+Shift+R
# (or touch this file) to hot-reload it.
# Real sky: NASA SVS Deep Star Maps 2020 (public domain), 16k galactic
# projection converted to a pyramidal TIFF so driftwm streams tiles and
# stays sharp under zoom. Wraps seamlessly left-right (equirectangular).
[background]
type = "tile"
path = "~/Pictures/Wallpapers/starmap_2020_16k_gal_purple.tif"
cache_budget_mb = 512

[keybindings]
# Core binds (override driftwm defaults where they collide).
"mod+q" = "exec foot"                                      # default was close-window
"mod+c" = "close-window"                                   # default was center-window
"mod+shift+c" = "center-window"                            # center-window relocated
"mod+k" = "spawn dms ipc call spotlight toggle"            # DMS launcher
"mod+l" = "spawn dms ipc call lock lock"                   # default was swaylock
"mod+n" = "spawn dms ipc call notifications open"
"mod+shift+r" = "spawn touch /home/rolle/.config/driftwm/config.toml"  # reload config + shader
# Volume: 1% steps with a 100% cap, matching the Hyprland setup.
"XF86AudioRaiseVolume" = "spawn wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+"
"XF86AudioLowerVolume" = "spawn wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-"
"XF86AudioMicMute" = "spawn wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle"
# GIF recording like on Hyprland (wf-recorder based).
"alt+Print" = "spawn /home/rolle/.local/bin/gifcap"

[mouse.on-window]
# Hyprland muscle memory: Super+LeftDrag moves the window under the cursor
# (on empty canvas Super+drag still pans, contexts keep both). Shift variant
# drags the whole snapped cluster. Super+RightDrag resizes.
"mod+left" = "move-window"
"mod+shift+left" = "move-snapped-windows"
"mod+right" = "resize-window"

# The Lounge IRC: pinned to the screen like on Hyprland, ignores pan/zoom,
# floats above the canvas. position is output-relative (origin = screen
# center, Y-up), computed from its Hyprland spot: right edge, upper area.
[[window_rules]]
app_id = "thelounge-app"
pinned_to_screen = true
position = [1327, 48]
size = [785, 1166]

# foot: barless frosted glass. decoration "minimal" = no title strip, just
# shadowless rounded glass (Super+C closes, Super+drag moves). driftwm
# flattens client alpha, so transparency comes from this rule's opacity.
# Blur edge-fade bevel is upstream-known (driftwm #125).
[[window_rules]]
app_id = "foot"
decoration = "minimal"
blur = true
opacity = 0.80

# Force 144 Hz like the Hyprland config did (monitor=DP-1,3440x1440@144).
# driftwm's "preferred" pick can land on 60 Hz, which makes the hardware
# cursor and everything else feel subtly laggy no matter the accel profile.
[[outputs]]
name = "DP-1"
mode = "3440x1440@144"

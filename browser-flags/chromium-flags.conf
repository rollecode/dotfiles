--ozone-platform-hint=auto
--enable-features=UseOzonePlatform,WaylandWindowDecorations,WebRTCPipeWireCapturer,AcceleratedVideoDecodeLinuxGL,VaapiIgnoreDriverChecks,VaapiOnNvidiaGPUs
--disable-features=WaylandFractionalScaleV1,UseChromeOSDirectVideoDecoder
--password-store=basic
--use-gl=angle
--use-angle=gl
--disable-gpu-memory-buffer-video-frames
--canvas-oop-rasterization
--disable-background-networking
--disable-component-update
# Vulkan experiment (mutually exclusive with the VA-API GL decode path above).
# To try it: comment out --use-angle=gl above, then uncomment the two lines below.
# --use-angle=vulkan
# --enable-features=Vulkan

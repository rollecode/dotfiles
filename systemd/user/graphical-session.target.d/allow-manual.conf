# Hyprland-without-uwsm needs to start this target manually from exec-once so
# that xdg-desktop-portal (Requisite=graphical-session.target) and other
# services that PartOf=graphical-session.target can come up. Lift the
# RefuseManualStart so a `systemctl --user start` from Hyprland works.
[Unit]
RefuseManualStart=no
StopWhenUnneeded=no

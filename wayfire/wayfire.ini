[core]
plugins = \
    autostart \
    hotcorners \
    scale \
    expo \
    move \
    resize \
    animate \
    wm-actions \
    vswitch \
    grid \
    window-rules \
    place \
    fast-switcher \
    alpha \
    blur \
    decoration \
    ipc \
    ipc-rules \
    invert \
    zoom \
    oswitch

# Number of workspaces (rows x cols)
vwidth = 5
vheight = 1

# Don't draw built-in window decorations; let DMS / apps do it
preferred_decoration_mode = client

# Use modifier+click for move/resize like Hyprland
[input]
xkb_layout = fi
xkb_options = lv3:ralt_switch,caps:escape
kb_repeat_rate = 50
kb_repeat_delay = 300

# Mouse — leave unset so Wayfire uses libinput's per-device defaults,
# which is exactly what Hyprland does with empty `accel_profile` /
# `sensitivity = 0`. Overriding with `flat` makes it floaty;
# overriding with `adaptive` is also wrong because libinput picks a
# device-specific default profile (the G502 X gets one tuned for it).

# ------------------------------------------------------------
# Autostart — replicate the bits from hyprland.conf that matter
# ------------------------------------------------------------
[autostart]
# DMS shell (matches your current Hyprland launch)
dms       = bash -c 'sleep 2; QT_QPA_PLATFORMTHEME=gtk3 dms run'
# Wallpaper (hyprpaper is Hyprland-only; swaybg works on any wlroots compositor)
# Edit the path below to point to your actual wallpaper
wallpaper = bash -c 'WP=$(grep -E "^preload" ~/.config/hypr/hyprpaper.conf 2>/dev/null | head -1 | cut -d= -f2 | xargs); [ -n "$WP" ] && swaybg -i "$WP" -m fill || true'
# Idle daemon (works fine outside Hyprland)
idle      = hypridle
# Clipboard history
clip_text = wl-paste --type text  --watch cliphist store
clip_img  = wl-paste --type image --watch cliphist store
# Nextcloud
nc        = bash -c 'sleep 5 && nextcloud --background'

# ------------------------------------------------------------
# THE feature you came for: Mac-style Exposé
# ------------------------------------------------------------
[scale]
toggle      = <super> KEY_A          # exposé current workspace
toggle_all  = <super> <shift> KEY_A  # exposé ALL workspaces (Mission Control)
duration    = 250
spacing     = 50
title_position = top
allow_zoom  = false
middle_click_close = true
include_minimized = true             # show minimized windows in exposé so you can restore
text_color  = \#ffffffff
bg_color    = \#1e1e2eee

# Hot corners — top-left = exposé, top-right = workspace overview
[hotcorners]
top-left-method   = wf-msg core/toggle_plugin_state scale
# (alternative direct dispatch; if the above doesn't fire, swap to:)
# top-left-method = wayfire-cmd "scale toggle"
top-right-method  = wf-msg core/toggle_plugin_state expo
timeout           = 200

# Workspace grid overview (Compiz "expo" style — like GNOME Activities)
[expo]
toggle = <super> KEY_TAB

# Quick app switcher (alt-tab)
[fast-switcher]
activate = <alt> KEY_TAB

# ------------------------------------------------------------
# Window behavior — floating-first like your Hyprland setup
# ------------------------------------------------------------
[place]
mode = cascade

[window-rules]
# Make every new window floating (no tiling, ever)
rule_float_all = on created: set floating true

# Standard move/resize bindings
[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

# Animations — keep it snappy
[animate]
open_animation  = fade
close_animation = fade
duration = 200

# Blur (DMS looks better with this on)
[blur]
method = kawase

# ------------------------------------------------------------
# Workspace switching
# ------------------------------------------------------------
[vswitch]
binding_left  = <super> KEY_LEFT
binding_right = <super> KEY_RIGHT
with_win_left  = <super> <shift> KEY_LEFT
with_win_right = <super> <shift> KEY_RIGHT

# Per-workspace number bindings: Super+1..5
[vswitch]
binding_1 = <super> KEY_1
binding_2 = <super> KEY_2
binding_3 = <super> KEY_3
binding_4 = <super> KEY_4
binding_5 = <super> KEY_5

# ------------------------------------------------------------
# Common app shortcuts
# ------------------------------------------------------------
[command]
binding_term     = <super> KEY_RETURN
command_term     = ghostty
binding_browser  = <super> KEY_B
command_browser  = brave
binding_files    = <super> KEY_E
command_files    = nautilus
binding_dms      = <super> KEY_K
command_dms      = dms ipc call spotlight toggle
binding_lock     = <super> <ctrl> KEY_L
command_lock     = hyprlock

# Logout / reload
[wm-actions]
toggle_maximize  = <super> KEY_F
toggle_fullscreen= <super> <shift> KEY_F
# minimize disabled — there's no taskbar, you'd lose the window.
# Use Alt+Tab or Super+A (exposé) to manage windows instead.
# minimize       = <super> KEY_M

# IPC socket (DMS may use this to talk to wayfire)
[ipc]
socket = /tmp/wayfire-ipc.sock

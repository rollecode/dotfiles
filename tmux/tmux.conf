# Tokyo Night status line, purple accent. Plain glyphs only: this bar is read on
# a phone as often as on the desktop, and powerline separators need a nerd font
# the mobile client may not have.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,foot*:Tc"

# Ctrl+a, not the Ctrl+b default: this is the muscle memory that already exists.
# Ctrl+a is also readline's start-of-line, so Ctrl+a a passes it through to the shell.
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix

# Alt+number jumps straight to a tab, no prefix. Terminals send Alt as an ESC
# prefix, so Esc then a number works too when typed quickly (inside escape-time).
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Splits that match what the keys look like
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

set -g mouse on

# Copy to the real system clipboard, not just tmux's own paste buffer. The
# default is "external", which only forwards OSC 52 that an application inside
# tmux sent itself: a selection made in tmux copy-mode goes nowhere near the
# clipboard, so Cmd+C had nothing to copy. With mouse on, tmux owns the drag,
# so this is the whole reason selecting text then hitting Cmd+C did nothing.
set -g set-clipboard on

# OSC 52 is an escape sequence, so it rides the SSH connection home: text
# selected in a tmux on a remote host lands on the local Mac clipboard. Declare
# the capability for every terminal rather than relying on the outer TERM
# matching a built-in entry, so foot and Termius get it too, not just WezTerm.
set -ga terminal-features ",*:clipboard"

# Nested tmux (local tmux -> ssh -> remote tmux) is the case that fails hardest:
# without this the outer tmux swallows the inner one's OSC 52 and the copy is
# lost at the first hop.
set -g allow-passthrough on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S · #W"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[bg=#bb9af7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#1a1b26] "
set -g status-right "#{?client_prefix,#[fg=#bb9af7]PREFIX ,}#[fg=#7aa2f7]#H #[fg=#565f89]· #[fg=#c0caf5]%H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#565f89] #I #W "
setw -g window-status-current-format "#[bg=#292e42,fg=#bb9af7,bold] #I #W "
setw -g window-status-activity-style "fg=#e0af68"

set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#bb9af7"
set -g message-style "bg=#bb9af7,fg=#1a1b26,bold"
set -g mode-style "bg=#bb9af7,fg=#1a1b26"

# Releasing a drag copies and LEAVES copy-mode. Every binding here ends in
# -and-cancel for that reason: a no-clear variant keeps copy-mode open, which
# parks a [0/25] indicator in the corner and turns every later keypress into a
# copy-mode command instead of shell input.
#
# Where a real clipboard tool exists, pipe straight into it. OSC 52 depends on
# the outer terminal accepting an escape sequence, which is not guaranteed and
# fails silently when it does not; pbcopy talks to the macOS pasteboard
# directly and cannot fail that way. Remote hosts with no such tool fall back
# to OSC 52 via set-clipboard, which is the only option that crosses SSH.
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel pbcopy
  bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel pbcopy
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel pbcopy
  bind -T copy-mode    y send -X copy-pipe-and-cancel pbcopy
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel wl-copy
    bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel wl-copy
  } {
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel
    bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel
  }
}

# Right click pastes the system clipboard, not tmux's own buffer, so it matches
# what the rest of the Mac does. This replaces tmux's right-click menu.
if-shell 'command -v pbpaste >/dev/null 2>&1' \
  'bind -n MouseDown3Pane run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer -p"' \
  'bind -n MouseDown3Pane paste-buffer -p'

bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
